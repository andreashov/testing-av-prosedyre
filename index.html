<!DOCTYPE html>
<html lang="no" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Røntgenprosedyrer – Sykehuset Østfold</title>
<style>
:root{
  --bg:#f0f4f9;--surface:#fff;--surface2:#f7f9fc;--border:#dde3ec;
  --text:#0d1b2e;--text2:#4a5a72;--text3:#8a97aa;
  --accent:#1a4f8a;--accent2:#2b6cb0;--accent-light:#dbeafe;
  --accent-light2:#bfdbfe;--dot-empty:#c8d4e3;
  --mark-bg:#fef08a;--shadow:0 1px 4px rgba(0,0,0,.07);
  --cat-v:#1a4f8a;--cat-b:#1a7a5a;
}
[data-theme="dark"]{
  --bg:#0c1520;--surface:#111e2e;--surface2:#162030;--border:#1e3045;
  --text:#e8edf5;--text2:#94a8c0;--text3:#4a6070;
  --accent:#4a9de0;--accent2:#5baee8;--accent-light:#1a2d45;
  --accent-light2:#1e3555;--dot-empty:#2a3d52;
  --mark-bg:#78530a;--shadow:0 1px 6px rgba(0,0,0,.3);
  --cat-v:#4a9de0;--cat-b:#3ac490;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);height:100vh;display:flex;flex-direction:column;transition:background .2s,color .2s}

/* TOPBAR */
.topbar{display:flex;align-items:center;gap:12px;padding:0 16px;height:52px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;box-shadow:var(--shadow)}
.logo-wrap{display:flex;align-items:center;gap:10px}
.logo-dots{display:grid;grid-template-columns:1fr 1fr;gap:3px;padding:2px}
.ld{border-radius:50%}
.ld.s{width:8px;height:8px}
.ld.m{width:10px;height:10px}
.ld.light{background:#5bb3e8}
.ld.dark{background:#1a4f8a}
[data-theme="dark"] .ld.dark{background:#4a9de0}
[data-theme="dark"] .ld.light{background:#2a7ab5}
.logo-text{font-size:14px;font-weight:700;color:var(--accent);letter-spacing:.04em;text-transform:uppercase}
.logo-sub{font-size:10px;color:var(--text3);letter-spacing:.06em;text-transform:uppercase;margin-top:1px}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.badge{font-size:10px;font-weight:600;color:var(--text3);letter-spacing:.05em;text-transform:uppercase;background:var(--surface2);border:1px solid var(--border);padding:3px 8px;border-radius:20px}
.theme-btn{width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text2);transition:all .15s}
.theme-btn:hover{background:var(--accent-light);border-color:var(--accent)}
.theme-btn svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2}

/* MAIN */
.main{display:flex;flex:1;overflow:hidden;gap:0}

/* NAV */
.nav{width:240px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.nav-top{padding:10px;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--surface2)}
.ptabs{display:flex;gap:3px;background:var(--bg);border-radius:8px;padding:3px;margin-bottom:8px}
.ptab{flex:1;padding:5px 0;border-radius:6px;border:none;background:transparent;font-size:11px;font-weight:600;color:var(--text3);cursor:pointer;letter-spacing:.02em;transition:all .15s}
.ptab.on{background:var(--surface);color:var(--accent);box-shadow:var(--shadow)}
.search-wrap{position:relative}
.search-wrap input{width:100%;padding:7px 10px 7px 30px;border-radius:8px;border:1px solid var(--border);background:var(--surface);font-size:12px;color:var(--text);outline:none;transition:border-color .15s}
.search-wrap input::placeholder{color:var(--text3)}
.search-wrap input:focus{border-color:var(--accent)}
.sico{position:absolute;left:9px;top:50%;transform:translateY(-50%);width:13px;height:13px;stroke:var(--text3);fill:none;stroke-width:2;pointer-events:none}
.nav-body{flex:1;overflow-y:auto;padding:8px 6px 12px}
.nav-body::-webkit-scrollbar{width:3px}
.nav-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

.pt-divider{font-size:10px;font-weight:700;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;padding:10px 6px 4px;display:flex;align-items:center;gap:6px}
.pt-divider::after{content:'';flex:1;height:1px;background:var(--border)}

.cat-row{display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:8px;cursor:pointer;user-select:none;transition:background .12s;margin-bottom:1px;color:var(--text)}
.cat-row:hover{background:var(--surface2)}
.cat-row.open{background:var(--accent-light)}
.cat-bar{width:3px;height:16px;border-radius:2px;flex-shrink:0}
.cat-label{font-size:12px;font-weight:600;flex:1;line-height:1.2}
.cat-count{font-size:10px;color:var(--text3);background:var(--bg);padding:1px 5px;border-radius:10px;border:1px solid var(--border)}
.cat-arr{width:12px;height:12px;stroke:var(--text3);fill:none;stroke-width:2.5;transition:transform .15s;flex-shrink:0}
.cat-arr.open{transform:rotate(90deg)}
.proc-rows{overflow:hidden;transition:max-height .2s ease}
.prow{display:flex;align-items:center;gap:8px;padding:5px 8px 5px 20px;border-radius:7px;cursor:pointer;transition:background .1s;margin-bottom:1px}
.prow:hover{background:var(--surface2)}
.prow.active{background:var(--accent-light);border-left:2px solid var(--accent)}
.pname{font-size:11.5px;color:var(--text2);flex:1;line-height:1.35}
.prow.active .pname{color:var(--accent);font-weight:600}
.has-link{width:4px;height:4px;border-radius:50%;background:var(--accent);flex-shrink:0;opacity:.7}
.no-link{width:4px;height:4px;border-radius:50%;background:var(--dot-empty);flex-shrink:0}
.no-results{padding:1.5rem 8px;text-align:center;font-size:12px;color:var(--text3)}

/* VIEWER */
.viewer{flex:1;display:flex;flex-direction:column;min-width:0}
.viewer-top{display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0;min-height:52px}
.viewer-title{font-size:13px;font-weight:600;color:var(--text);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.viewer-title.empty{color:var(--text3);font-weight:400}
.ext-btn{padding:5px 12px;border-radius:7px;border:1px solid var(--accent);background:transparent;font-size:11px;font-weight:600;color:var(--accent);cursor:pointer;white-space:nowrap;transition:all .15s;text-decoration:none;display:inline-flex;align-items:center;gap:5px}
.ext-btn:hover{background:var(--accent);color:#fff}
.viewer-body{flex:1;overflow:hidden;display:flex;align-items:center;justify-content:center;background:var(--bg)}
.empty-state{display:flex;flex-direction:column;align-items:center;gap:12px;color:var(--text3);padding:2rem}
.empty-state svg{opacity:.4;stroke:var(--text3)}
.empty-state p{font-size:13px;text-align:center;line-height:1.6;color:var(--text3)}
.blocked-state{display:flex;flex-direction:column;align-items:center;gap:12px;color:var(--text2);padding:2rem;text-align:center;max-width:380px}
.blocked-state .icon-wrap{width:60px;height:60px;border-radius:16px;background:var(--accent-light);display:flex;align-items:center;justify-content:center}
.blocked-state svg{stroke:var(--accent);fill:none;stroke-width:1.5}
.blocked-state h3{font-size:14px;font-weight:600;color:var(--text)}
.blocked-state p{font-size:12.5px;line-height:1.6;color:var(--text2)}
.blocked-state .url-box{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:8px 12px;font-size:11px;color:var(--text3);word-break:break-all;line-height:1.5;width:100%}
.copy-btn{padding:6px 14px;border-radius:7px;border:1px solid var(--accent);background:var(--accent);font-size:11px;font-weight:600;color:#fff;cursor:pointer;transition:opacity .15s}
.copy-btn:hover{opacity:.85}
</style>
</head>
<body>
<div class="topbar">
  <div class="logo-wrap">
    <!-- Recreated logo dots (4 dots in 2x2 grid with size/color variation) -->
    <svg width="34" height="34" viewBox="0 0 34 34" fill="none">
      <circle cx="8" cy="8" r="5.5" fill="#5bb3e8"/>
      <circle cx="22" cy="8" r="4.5" fill="#5bb3e8" opacity=".6"/>
      <circle cx="8" cy="22" r="4.5" fill="#1a4f8a"/>
      <circle cx="22" cy="22" r="3.5" fill="#1a4f8a" opacity=".7"/>
    </svg>
    <div>
      <div class="logo-text">Sykehuset Østfold</div>
      <div class="logo-sub">Røntgenprosedyrer</div>
    </div>
  </div>
  <div class="topbar-right">
    <span class="badge">Radiologi</span>
    <button class="theme-btn" onclick="toggleTheme()" title="Bytt tema" id="theme-btn">
      <svg id="theme-ico" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
    </button>
  </div>
</div>

<div class="main">
  <div class="nav">
    <div class="nav-top">
      <div class="ptabs">
        <button class="ptab on" onclick="setPt('alle',this)">Alle</button>
        <button class="ptab" onclick="setPt('voksen',this)">Voksen</button>
        <button class="ptab" onclick="setPt('barn',this)">Barn</button>
      </div>
      <div class="search-wrap">
        <svg class="sico" viewBox="0 0 16 16"><circle cx="6.5" cy="6.5" r="4.5"/><line x1="10.5" y1="10.5" x2="14" y2="14"/></svg>
        <input type="text" id="q" placeholder="Søk prosedyre…" oninput="render()">
      </div>
    </div>
    <div class="nav-body" id="nav-body"></div>
  </div>

  <div class="viewer">
    <div class="viewer-top" id="viewer-top">
      <span class="viewer-title empty" id="viewer-title">Velg en prosedyre fra listen</span>
      <a class="ext-btn" id="open-ext-btn" style="display:none" target="_blank" href="#">
        <svg width="11" height="11" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M7 3H3v10h10V9M10 2h4v4M14 2L8 8"/></svg>
        Åpne lenke
      </a>
    </div>
    <div class="viewer-body" id="viewer-body">
      <div class="empty-state">
        <svg width="48" height="48" viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M14 6h13l11 11v25H14V6z"/><path d="M27 6v11h11"/><line x1="19" y1="22" x2="35" y2="22"/><line x1="19" y1="28" x2="35" y2="28"/><line x1="19" y1="34" x2="29" y2="34"/></svg>
        <p>Velg en prosedyre til venstre<br>for å se detaljer</p>
      </div>
    </div>
  </div>
</div>

<script>
const CATS=[
  {id:"caput",label:"Caput",color:"#1a4f8a",pt:"voksen",procs:[
    {name:"RG Caput / RG Orbita ved spørsmål om fremmedlegeme",url:null}
  ]},
  {id:"thorax-v",label:"Thorax / Abdomen",color:"#2563a8",pt:"voksen",procs:[
    {name:"RG Thorax / Cor",url:null},{name:"RG Costa",url:null},
    {name:"RG Sternum / Sternoclavicularledd",url:null},{name:"RG Abdomen",url:null},
    {name:"Oro-anal transittid (OATT) måling med pellets",url:null},
    {name:"RG Urinveier",url:null},{name:"RG Shuntoversikt Caput / Thorax / Abdomen",url:null}
  ]},
  {id:"columna-v",label:"Columna",color:"#1e6fa0",pt:"voksen",procs:[
    {name:"RG Cervicalcolumna",url:null},{name:"RG Thoracalcolumna",url:null},
    {name:"RG Lumbosacralcolumna",url:null},{name:"RG Ileosacralledd",url:null},
    {name:"RG Os Sacrum / Os Coccygis",url:null},
    {name:"RG Scoliosemåling LAB 4 Moss",url:null},{name:"RG Scoliosemåling LAB 3 Moss",url:null}
  ]},
  {id:"bekken-v",label:"Bekken",color:"#156d8a",pt:"voksen",procs:[
    {name:"RG Bekken",url:null},{name:"RG Hofte",url:null},
    {name:"RG Aksemåling underekstremiteter LAB 4 Moss",url:null},
    {name:"RG Aksemåling underekstremiteter LAB 3 Moss",url:null},
    {name:"RG Benlengdemåling LAB 4 Moss",url:null},{name:"RG Benlengdemåling LAB 3 Moss",url:null}
  ]},
  {id:"over-v",label:"Overekstremitet",color:"#0f5975",pt:"voksen",procs:[
    {name:"RG Skulder",url:"https://ek-sohf.sikt.sykehuspartner.no/docs/pub/DOK04212.pdf"},
    {name:"RG Scapula",url:"https://ek-sohf.sikt.sykehuspartner.no/docs/pub/DOK04213.pdf"},
    {name:"RG Clavicula",url:"https://ek-sohf.sikt.sykehuspartner.no/docs/pub/DOK04214.pdf"},
    {name:"RG Acromio-clavicularledd",url:"https://ek-sohf.sikt.sykehuspartner.no/docs/pub/DOK04215.pdf"},
    {name:"RG Humerus",url:"https://ek-sohf.sikt.sykehuspartner.no/docs/pub/DOK04216.pdf"},
    {name:"RG Albue",url:"https://ek-sohf.sikt.sykehuspartner.no/docs/pub/DOK04219.pdf"},
    {name:"RG Underarm",url:"https://ek-sohf.sikt.sykehuspartner.no/docs/pub/DOK04220.pdf"},
    {name:"RG Håndledd",url:"https://ek-sohf.sikt.sykehuspartner.no/docs/pub/DOK04221.pdf"},
    {name:"RG Os scaphoideum",url:"https://ek-sohf.sikt.sykehuspartner.no/docs/pub/DOK04222.pdf"},
    {name:"RG Hånd",url:"https://ek-sohf.sikt.sykehuspartner.no/docs/pub/DOK04223.pdf"},
    {name:"RG Fingre",url:"https://ek-sohf.sikt.sykehuspartner.no/docs/pub/DOK04224.pdf"}
  ]},
  {id:"under-v",label:"Underekstremitet",color:"#1a4f8a",pt:"voksen",procs:[
    {name:"RG Femur",url:"https://ek-sohf.sikt.sykehuspartner.no/docs/pub/DOK04227.pdf"},
    {name:"RG Kne",url:"https://ek-sohf.sikt.sykehuspartner.no/docs/pub/DOK04228.pdf"},
    {name:"RG Legg",url:"https://ek-sohf.sikt.sykehuspartner.no/docs/pub/DOK04229.pdf"},
    {name:"RG Ankel",url:"https://ek-sohf.sikt.sykehuspartner.no/docs/pub/DOK04230.pdf"},
    {name:"RG Calcaneus",url:"https://ek-sohf.sikt.sykehuspartner.no/docs/pub/DOK04231.pdf"},
    {name:"RG Fot / tær",url:"https://ek-sohf.sikt.sykehuspartner.no/docs/pub/DOK04232.pdf"}
  ]},
  {id:"thorax-b",label:"Thorax / Abdomen",color:"#0f7a5a",pt:"barn",procs:[
    {name:"RG Epipharynx barn",url:null},
    {name:"RG Thorax / Abdomen på nyfødtintensiv (NFI)",url:null},
    {name:"RG Thorax barn",url:null},{name:"RG Abdomen barn",url:null},
    {name:"RG Tarmpassasje på barn",url:null}
  ]},
  {id:"columna-b",label:"Columna",color:"#1a6870",pt:"barn",procs:[
    {name:"RG Cervicalcolumna av barn",url:null},{name:"RG Thoracalcolumna av barn",url:null},
    {name:"RG Lumbosacralcolumna av barn",url:null},
    {name:"RG Os Sacrum / Os Coccygis av barn",url:null}
  ]},
  {id:"bekken-b",label:"Bekken",color:"#0e7a55",pt:"barn",procs:[
    {name:"RG Bekken og hofter av barn",url:null}
  ]},
  {id:"over-b",label:"Overekstremitet",color:"#1a7a4a",pt:"barn",procs:[
    {name:"RG Skulder av barn",url:null},{name:"RG Clavicula av barn",url:null},
    {name:"RG Humerus barn",url:null},{name:"RG Albue av barn",url:null},
    {name:"RG Underarm av barn",url:null},{name:"RG Håndledd barn",url:null},
    {name:"RG Hånd, fingre, skjelettalder av barn",url:null}
  ]},
  {id:"under-b",label:"Underekstremitet",color:"#0f6b5a",pt:"barn",procs:[
    {name:"RG Femur barn",url:null},{name:"RG Kne av barn",url:null},
    {name:"RG Legg barn",url:null},{name:"RG Ankel barn",url:null},{name:"RG Fot barn",url:null}
  ]},
  {id:"spesial",label:"Spesialundersøkelser",color:"#157a60",pt:"barn",procs:[
    {name:"RG ved mistanke om barnemishandling / plutselig spedbarnsdød",url:null},
    {name:"RG ved skjelettdysplasier på barn",url:null},
    {name:"RG Totalskjelett ved dødfødsel / abort",url:null}
  ]}
];

let pt="alle", activeProc=null, activeUrl=null;
const openCats={};
CATS.forEach(c=>openCats[c.id]=false);

// Theme
const root=document.documentElement;
const stored=localStorage.getItem('so-theme')||'light';
root.setAttribute('data-theme',stored);
updateThemeIcon(stored);

function toggleTheme(){
  const cur=root.getAttribute('data-theme');
  const next=cur==='light'?'dark':'light';
  root.setAttribute('data-theme',next);
  localStorage.setItem('so-theme',next);
  updateThemeIcon(next);
}
function updateThemeIcon(t){
  const ico=document.getElementById('theme-ico');
  if(t==='dark') ico.innerHTML='<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>';
  else ico.innerHTML='<path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>';
}

function setPt(val,btn){
  pt=val;
  document.querySelectorAll('.ptab').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  function copyUrl(url, btn){
  try {
    const ta=document.createElement('textarea');
    ta.value=url; ta.style.position='fixed'; ta.style.opacity='0';
    document.body.appendChild(ta); ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    btn.textContent='✓ Kopiert!';
    setTimeout(()=>btn.textContent='Kopier lenke',1800);
  } catch(e){
    btn.textContent='Kunne ikke kopiere';
    setTimeout(()=>btn.textContent='Kopier lenke',2000);
  }
}

render();
}

function toggleCat(id){
  openCats[id]=!openCats[id];
  render();
}

function selectProc(name, url){
  activeProc=name; activeUrl=url;
  const titleEl=document.getElementById('viewer-title');
  titleEl.textContent=name;
  titleEl.className='viewer-title';
  const extBtn=document.getElementById('open-ext-btn');
  const body=document.getElementById('viewer-body');

  if(url && url!=='null'){
    extBtn.href=url;
    extBtn.style.display='inline-flex';
    body.innerHTML=`
      <div style="width:100%;height:100%;display:flex;flex-direction:column;">
        <iframe src="${url}" title="${name}" style="flex:1;width:100%;border:none;display:block;"
          onerror="this.style.display='none';document.getElementById('pdf-fallback').style.display='flex'">
        </iframe>
        <div id="pdf-fallback" style="display:none;flex-direction:column;align-items:center;gap:12px;padding:2rem;text-align:center;color:var(--text2);max-width:380px;margin:auto">
          <div class="icon-wrap"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="1.5"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg></div>
          <h3 style="font-size:14px;font-weight:600;color:var(--text)">${name}</h3>
          <p style="font-size:12.5px;line-height:1.6">Dokumentet kunne ikke vises her. Det kan kreve VPN eller sykehusets interne nettverk. Åpne lenken direkte i nettleseren.</p>
          <div class="url-box">${url}</div>
          <button class="copy-btn" onclick="copyUrl('${url}',this)">Kopier lenke</button>
        </div>
      </div>`;
  } else {
    extBtn.style.display='none';
    body.innerHTML=`
      <div class="blocked-state">
        <div class="icon-wrap">
          <svg width="28" height="28" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="12" x2="12" y2="16"/><line x1="12" y1="18" x2="12.01" y2="18"/></svg>
        </div>
        <h3>${name}</h3>
        <p>Lenke til denne prosedyren er ikke lagt inn ennå. Legg til URL i <code>CATS</code>-listen i kildekoden for å aktivere denne.</p>
      </div>`;
  }
  renderNav();
}

function hl(t,q){
  if(!q) return t;
  const i=t.toLowerCase().indexOf(q.toLowerCase());
  if(i<0) return t;
  return t.slice(0,i)+`<mark style="background:var(--mark-bg);border-radius:2px;padding:0 1px">`+t.slice(i,i+q.length)+'</mark>'+t.slice(i+q.length);
}

function visibleCats(q){
  return CATS.filter(c=>{
    if(pt==='voksen'&&c.pt!=='voksen') return false;
    if(pt==='barn'&&c.pt!=='barn') return false;
    if(q) return c.procs.some(p=>p.name.toLowerCase().includes(q.toLowerCase()));
    return true;
  });
}

function render(){ renderNav(); }

function renderNav(){
  const q=document.getElementById('q').value.trim();
  const cats=visibleCats(q);
  const showBoth=pt==='alle';
  let html='';

  if(q){
    cats.forEach(c=>{
      c.procs.filter(p=>p.name.toLowerCase().includes(q.toLowerCase())).forEach(p=>{
        html+=pRow(p,c,q,true);
      });
    });
    if(!html) html=`<div class="no-results">Ingen treff for «${q}»</div>`;
  } else {
    const vCats=cats.filter(c=>c.pt==='voksen');
    const bCats=cats.filter(c=>c.pt==='barn');
    if(showBoth&&vCats.length){ html+=`<div class="pt-divider">Voksen</div>`; vCats.forEach(c=>{html+=catBlock(c,q);}); }
    else { vCats.forEach(c=>{html+=catBlock(c,q);}); }
    if(showBoth&&bCats.length){ html+=`<div class="pt-divider">Barn</div>`; bCats.forEach(c=>{html+=catBlock(c,q);}); }
    else { bCats.forEach(c=>{html+=catBlock(c,q);}); }
  }

  document.getElementById('nav-body').innerHTML=html;
}

function catBlock(c,q){
  const isOpen=openCats[c.id];
  const hasActive=c.procs.some(p=>p.name===activeProc);
  const show=isOpen||hasActive;
  const rows=c.procs.map(p=>pRow(p,c,q,false)).join('');
  return `<div>
    <div class="cat-row${show?' open':''}" onclick="toggleCat('${c.id}')">
      <span class="cat-bar" style="background:${c.color}"></span>
      <span class="cat-label">${c.label}</span>
      <span class="cat-count">${c.procs.length}</span>
      <svg class="cat-arr${show?' open':''}" viewBox="0 0 16 16"><polyline points="6,4 10,8 6,12"/></svg>
    </div>
    <div class="proc-rows" style="max-height:${show?'900px':'0'}">${rows}</div>
  </div>`;
}

function pRow(p,c,q,flat){
  const isAct=activeProc===p.name;
  const indent=flat?'padding-left:8px':'';
  const safeUrl=p.url||'null';
  const safeName=p.name.replace(/'/g,"\\'");
  const dotHtml=p.url?`<span class="has-link"></span>`:`<span class="no-link"></span>`;
  return `<div class="prow${isAct?' active':''}" style="${indent}" onclick="selectProc('${safeName}','${safeUrl}')">
    ${dotHtml}
    <span class="pname">${hl(p.name,q)}</span>
  </div>`;
}

render();
</script>
</body>
</html>
